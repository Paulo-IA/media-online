<main class="page-wrapper">
  <div class="shad-card">

    <div class="card-header">
      <h1 class="card-title">Calculadora de Média Final</h1>
      <p class="card-description">Simule as notas e descubra a média final.</p>
    </div>

    <div class="card-content">
      <div class="input-grid">
        <div class="input-wrapper">
          <label for="pt1">PT1 (Teórica)</label>
          <input type="text" inputmode="decimal" appDecimal id="pt1" placeholder="0.0" [(ngModel)]="pt1">
        </div>
        <div class="input-wrapper">
          <label for="pt2">PT2 (Teórica)</label>
          <input type="text" inputmode="decimal" appDecimal id="pt2" placeholder="0.0" [(ngModel)]="pt2">
        </div>

        <div class="input-wrapper">
          <label for="pi1">PI1 (Prática)</label>
          <input type="text" inputmode="decimal" appDecimal id="pi1" placeholder="0.0" [(ngModel)]="pi1">
        </div>
        <div class="input-wrapper">
          <label for="pi2">PI2 (Prática)</label>
          <input type="text" inputmode="decimal" appDecimal id="pi2" placeholder="0.0" [(ngModel)]="pi2">
        </div>

        <div class="input-wrapper">
          <label for="nci">NCI (Clínica)</label>
          <input type="text" inputmode="decimal" appDecimal id="nci" placeholder="0.0" [(ngModel)]="nci">
        </div>
        <div class="input-wrapper">
          <label for="npaeg">NPAEG (Extensão)</label>
          <input type="text" inputmode="decimal" appDecimal id="npaeg" placeholder="0.0" [(ngModel)]="npaeg">
        </div>
      </div>

      <div class="input-wrapper extra-point-container">
        <label for="extra">Ponto Extra (Máx 0,5)</label>
        <input type="text" inputmode="decimal" appDecimal id="extra" [maxLimit]="0.5" placeholder="0.0"
          [(ngModel)]="pontoExtra">
      </div>
    </div>

    <div class="card-footer">
      <div class="result-box">
        <span class="result-label">Média Final</span>
        <span class="result-value">{{ mediaFinal() }}</span>
      </div>
    </div>

  </div>
</main>
